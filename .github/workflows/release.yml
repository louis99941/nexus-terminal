name: 构建与发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号（留空则使用 VERSION 文件中的版本）'
        required: false
        type: string
  repository_dispatch:
    types: [release-triggered]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 缓存 Git 对象数据库
        uses: actions/cache@v4
        with:
          path: .git/objects
          key: git-objects-${{ github.repository }}-${{ github.sha }}
          restore-keys: |
            git-objects-${{ github.repository }}-

      - name: 解析版本号
        id: release_meta
        run: |
          set -euo pipefail
          TAG=""
          VERSION=""

          # 优先从 repository_dispatch payload 获取版本号
          PAYLOAD_VERSION=$(jq -r '.client_payload.version // ""' "$GITHUB_EVENT_PATH" 2>/dev/null || echo "")
          PAYLOAD_TAG=$(jq -r '.client_payload.tag // ""' "$GITHUB_EVENT_PATH" 2>/dev/null || echo "")

          if [[ -n "$PAYLOAD_VERSION" ]]; then
            VERSION="$PAYLOAD_VERSION"
            TAG="${PAYLOAD_TAG:-v${VERSION}}"
            echo "✅ 从 repository_dispatch 获取版本号：$VERSION"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            echo "✅ 从标签获取版本号：$VERSION"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION}"
            echo "✅ 从 workflow_dispatch inputs 获取版本号：$VERSION"
          else
            VERSION=$(cat VERSION | tr -d '[:space:]')
            TAG="v${VERSION}"
            echo "✅ 从 VERSION 文件获取版本号：$VERSION"
          fi

          if [[ -z "$TAG" ]]; then
            echo "❌ 无法解析有效的标签，流程终止"
            exit 1
          fi

          echo "✅ 将创建 Release：$TAG (version: $VERSION)"
          {
            echo "TAG=$TAG"
            echo "VERSION=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: 等待 kittylog.app 更新（最多 5 分钟）
        id: wait_kittylog
        env:
          VERSION: ${{ steps.release_meta.outputs.VERSION }}
        run: |
          echo "⏳ 等待 kittylog.app 生成 v${VERSION} 更新日志..."
          KITTYLOG_URL="https://kittylog.app/c/Silentely/nexus-terminal"
          MAX_ATTEMPTS=5  # 每分钟轮询一次，最多 5 分钟
          POLL_INTERVAL=60

          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "  📡 轮询 [$i/$MAX_ATTEMPTS]..."

            PAGE=$(curl -sL --max-time 5 "$KITTYLOG_URL" 2>/dev/null || true)

            if echo "$PAGE" | grep -qi "v${VERSION}"; then
              echo "✅ kittylog.app 已包含 v${VERSION} 更新日志"
              echo "found=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
              echo "  ⏳ 未找到，${POLL_INTERVAL}s 后重试..."
              sleep $POLL_INTERVAL
            fi
          done

          echo "⚠️ 等待超时（${MAX_ATTEMPTS} 分钟），将使用 AI 保底生成"
          echo "found=false" >> "$GITHUB_OUTPUT"

      - name: 从 kittylog.app 提取更新日志
        if: steps.wait_kittylog.outputs.found == 'true'
        id: kittylog_extract
        env:
          VERSION: ${{ steps.release_meta.outputs.VERSION }}
        run: |
          set -euo pipefail
          KITTYLOG_URL="https://kittylog.app/c/Silentely/nexus-terminal"

          # 设置默认值，防止步骤失败时输出为空
          echo "found=false" >> "$GITHUB_OUTPUT"

          PAGE=$(curl -sL --max-time 30 "$KITTYLOG_URL" 2>/dev/null || true)

          if [ -z "$PAGE" ]; then
            echo "⚠️ 无法访问 kittylog.app"
            exit 0
          fi

          # 提取指定版本的更新日志块
          # kittylog.app 使用 Markdown 格式，版本标题为 ## vX.Y.Z
          BODY=$(echo "$PAGE" | awk -v tag="$VERSION" '
            BEGIN { found=0 }
            /^## v/ {
              if (found) { exit }
              if (index($0, tag) > 0) {
                found=1
                print $0
                next
              }
            }
            found && NF { print }
          ')

          if [ -n "$BODY" ]; then
            # 使用随机 delimiter 避免内容冲突
            DELIM="changelog_$(openssl rand -hex 8)"
            echo "✅ 从 kittylog.app 提取到 v${VERSION} 更新日志"
            {
              echo "body<<${DELIM}"
              echo "$BODY"
              echo "$DELIM"
            } >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ kittylog.app 未找到 v${VERSION} 内容"
          fi

      - name: AI 生成更新日志（兜底）
        if: steps.kittylog_extract.outputs.found != 'true'
        id: ai_changelog
        env:
          VERSION: ${{ steps.release_meta.outputs.VERSION }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4o' }}
        run: |
          if [[ -z "${OPENAI_API_KEY:-}" ]]; then
            echo "⚠️ 未配置 OPENAI_API_KEY，跳过 AI 生成"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 收集上个版本到 HEAD 的 commits（精确排除当前 tag）
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | grep -Fxv "v${VERSION}" | head -n 1 || true)
          if [[ -z "$PREV_TAG" ]]; then
            echo "⚠️ 无法找到上个版本标签，跳过 AI 生成"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMITS=$(git log "${PREV_TAG}..HEAD" --format="%h|%s" --no-merges)
          DIFF_STAT=$(git diff --stat "${PREV_TAG}..HEAD" | tail -5)
          TODAY=$(date +%Y-%m-%d)

          if [[ -z "$COMMITS" ]]; then
            echo "⚠️ 无 commits 变更，跳过 AI 生成"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 构建提示词
          PROMPT=$(cat <<'PROMPT_EOF'
          你是 Nexus Terminal 项目的技术文档工程师。请根据以下 commits 和变更统计，生成更新日志。

          格式要求：
          - 版本头：## vVERSION_PLACEHOLDER（DATE_PLACEHOLDER）
          - 分类：### 新增 | 修复 | 改进 | 安全 | 测试 | 文档 | 杂项
          - 条目：- <emoji> <中文描述>
          - Emoji 映射：✨新增 🐛修复 ♻️改进 🔒安全 ✅测试 📝文档 🔧杂项 ⚡性能 📊监控 📱移动端 🎨UI
          - 合并同一功能的多个 commit 为一个条目
          - 仅输出 Markdown 格式的更新日志内容，不要添加其他说明

          Commits：
          COMMITS_PLACEHOLDER

          变更统计：
          DIFF_PLACEHOLDER

          请直接输出 Markdown 格式的更新日志：
          PROMPT_EOF
          )

          # 替换占位符
          PROMPT="${PROMPT//VERSION_PLACEHOLDER/$VERSION}"
          PROMPT="${PROMPT//DATE_PLACEHOLDER/$TODAY}"
          PROMPT="${PROMPT//COMMITS_PLACEHOLDER/$COMMITS}"
          PROMPT="${PROMPT//DIFF_PLACEHOLDER/$DIFF_STAT}"

          # 调用 OpenAI 兼容 API（显式捕获失败，避免 set -e 中断）
          BASE_URL="${OPENAI_BASE_URL:-https://api.openai.com/v1}"
          if ! RESPONSE=$(curl -sS --max-time 90 "${BASE_URL}/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -d "$(jq -n \
              --arg model "${OPENAI_MODEL:-gpt-4o}" \
              --arg content "$PROMPT" \
              '{
                model: $model,
                messages: [{role: "user", content: $content}],
                max_tokens: 4096,
                temperature: 0.3
              }')"); then
            echo "⚠️ OpenAI API 请求失败（网络/超时）"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BODY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [[ -n "$BODY" ]]; then
            # 移除可能的 markdown 代码块包裹
            BODY=$(echo "$BODY" | sed '/^```/d')
            # 使用随机 delimiter 避免内容冲突
            DELIM="changelog_$(openssl rand -hex 8)"
            echo "✅ AI 生成更新日志成功"
            {
              echo "body<<${DELIM}"
              echo "$BODY"
              echo "$DELIM"
              echo "found=true"
            } >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ AI 生成失败：$(echo "$RESPONSE" | jq -r '.error.message // "未知错误"')"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 合并更新日志内容
        id: release_notes
        env:
          KITTYLOG_FOUND: ${{ steps.kittylog_extract.outputs.found }}
          KITTYLOG_BODY: ${{ steps.kittylog_extract.outputs.body }}
          AI_FOUND: ${{ steps.ai_changelog.outputs.found }}
          AI_BODY: ${{ steps.ai_changelog.outputs.body }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.TAG }}
        run: |
          # 优先级：kittylog.app > AI 生成 > 暂无内容
          if [[ "$KITTYLOG_FOUND" == "true" ]]; then
            BODY="$KITTYLOG_BODY"
            SOURCE="kittylog.app"
          elif [[ "$AI_FOUND" == "true" ]]; then
            BODY="$AI_BODY"
            SOURCE="AI 生成"
          else
            BODY="暂无更新日志内容"
            SOURCE="默认"
          fi

          echo "📝 使用更新日志来源：$SOURCE"
          DELIM="changelog_$(openssl rand -hex 8)"
          {
            echo "body<<${DELIM}"
            echo "$BODY"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

          # 生成完整更新日志链接
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          CURRENT_TAG="$RELEASE_TAG"
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | grep -Fxv "$CURRENT_TAG" | head -n 1 || true)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG_URL="https://github.com/${OWNER}/${REPO}/compare/${PREV_TAG}...${CURRENT_TAG}"
          else
            CHANGELOG_URL="https://github.com/${OWNER}/${REPO}/commits/${CURRENT_TAG}"
          fi
          echo "CHANGELOG_URL=$CHANGELOG_URL" >> "$GITHUB_OUTPUT"

      - name: 同步更新日志到 docs/changelog.md
        env:
          VERSION: ${{ steps.release_meta.outputs.VERSION }}
          RELEASE_BODY: ${{ steps.release_notes.outputs.body }}
        run: |
          set -euo pipefail

          echo "📝 将更新日志同步到 docs/changelog.md..."

          # 精确检查 docs/changelog.md 是否已包含该版本（避免 v1.5 匹配 v1.5.4）
          if grep -Eq "^## v${VERSION}([[:space:]]|（|\\()" docs/changelog.md 2>/dev/null; then
            echo "ℹ️ docs/changelog.md 已包含 v${VERSION}，跳过同步"
            exit 0
          fi

          # 按第一个版本标题定位插入点（与本地脚本逻辑一致）
          CHANGELOG=$(cat docs/changelog.md)

          # 查找第一个版本标题的位置
          if echo "$CHANGELOG" | grep -qn "^## v"; then
            # 提取第一个版本标题所在行号
            FIRST_VERSION_LINE=$(echo "$CHANGELOG" | grep -n "^## v" | head -1 | cut -d: -f1)

            # 分割内容：标题部分 + 新版本 + 现有版本
            HEAD_PART=$(echo "$CHANGELOG" | head -n $((FIRST_VERSION_LINE - 1)))
            VERSIONS_PART=$(echo "$CHANGELOG" | tail -n +$FIRST_VERSION_LINE)

            # 合并写入
            {
              echo "$HEAD_PART"
              echo ""
              echo "$RELEASE_BODY"
              echo ""
              echo "$VERSIONS_PART"
            } > docs/changelog.md
          else
            # 没有现有版本标题，追加到文件末尾
            {
              cat docs/changelog.md
              echo ""
              echo "$RELEASE_BODY"
              echo ""
            } > docs/changelog.md
          fi

          echo "✅ 已将 v${VERSION} 更新日志写入 docs/changelog.md"

      - name: 提交更新日志变更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/changelog.md
          if git diff --cached --quiet; then
            echo "ℹ️ 无变更需要提交"
            exit 0
          fi

          # 重试机制：最多尝试 3 次推送
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            echo "📝 尝试提交并推送 [$i/$MAX_RETRIES]..."

            # 先拉取最新代码，解决可能的冲突
            git pull --rebase origin main || true

            if git commit -m "📝 docs: 同步更新日志至 v${{ steps.release_meta.outputs.VERSION }}"; then
              if git push origin main; then
                echo "✅ 已成功提交并推送 docs/changelog.md 变更"
                exit 0
              fi
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "  ⏳ 推送失败，${i}s 后重试..."
              sleep $i
            fi
          done

          echo "❌ 推送失败，请手动检查"
          exit 1

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.TAG }}
          name: ${{ steps.release_meta.outputs.TAG }}
          body: |
            ${{ steps.release_notes.outputs.body }}

            ---

            ## Docker 镜像

            Docker 镜像已发布到 GitHub Container Registry：

            ```
            # Backend
            docker pull ghcr.io/silentely/nexus-terminal-backend:${{ steps.release_meta.outputs.VERSION }}
            docker pull ghcr.io/silentely/nexus-terminal-backend:latest

            # Frontend
            docker pull ghcr.io/silentely/nexus-terminal-frontend:${{ steps.release_meta.outputs.VERSION }}
            docker pull ghcr.io/silentely/nexus-terminal-frontend:latest

            # Remote Gateway
            docker pull ghcr.io/silentely/nexus-terminal-remote-gateway:${{ steps.release_meta.outputs.VERSION }}
            docker pull ghcr.io/silentely/nexus-terminal-remote-gateway:latest
            ```

            📖 完整更新日志：${{ steps.release_notes.outputs.CHANGELOG_URL }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 触发 Docker 构建
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: docker-build-triggered
          client-payload: '{"version": "${{ steps.release_meta.outputs.VERSION }}", "tag": "${{ steps.release_meta.outputs.TAG }}"}'
