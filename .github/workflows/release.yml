name: 构建与发布

on:
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG.md'
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号（留空则使用 VERSION 文件中的版本）'
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ 当前版本：$VERSION"

      - name: 解析发布标签
        id: release_meta
        run: |
          set -euo pipefail
          VERSION_INPUT=$(jq -r '.inputs.version // ""' "$GITHUB_EVENT_PATH")
          PAYLOAD_VERSION=$(jq -r '.client_payload.version // ""' "$GITHUB_EVENT_PATH")
          TAG=""
          VERSION=""

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          elif [[ -n "$VERSION_INPUT" ]]; then
            VERSION="$VERSION_INPUT"
            TAG="v${VERSION}"
          elif [[ -n "$PAYLOAD_VERSION" ]]; then
            VERSION="$PAYLOAD_VERSION"
            TAG="v${VERSION}"
          else
            VERSION="${{ steps.version.outputs.VERSION }}"
            TAG="v${VERSION}"
          fi

          TARGET="$GITHUB_SHA"

          if [[ -z "$TAG" ]]; then
            echo "❌ 无法解析有效的标签，流程终止"
            exit 1
          fi

          echo "✅ 将创建/更新 Release：$TAG (version: $VERSION)"
          {
            echo "TAG=$TAG"
            echo "VERSION=$VERSION"
            echo "TARGET=$TARGET"
          } >> "$GITHUB_OUTPUT"

      - name: 从 CHANGELOG.md 提取更新日志
        id: release_notes
        env:
          CURRENT_TAG: ${{ steps.release_meta.outputs.TAG }}
          VERSION: ${{ steps.release_meta.outputs.VERSION }}
        run: |
          set -euo pipefail

          # 提取 CHANGELOG.md 中当前版本的更新内容
          # 匹配 ## [vX.Y.Z] 或 ## vX.Y.Z 格式的标题，提取到下一个 ## 标题之前
          BODY=$(awk -v tag="$VERSION" '
            BEGIN { found=0 }
            /^## / {
              if (found) { exit }
              if (index($0, tag) > 0 || index($0, "v" tag) > 0) {
                found=1
                # 输出标题行
                print $0
                next
              }
            }
            found && NF { print }
          ' CHANGELOG.md)

          if [ -z "$BODY" ]; then
            # 回退：提取最新版本段落
            BODY=$(awk '/^## \[/{if(p){exit};p=1} p&&NF{print}' CHANGELOG.md)
          fi

          if [ -z "$BODY" ]; then
            BODY="暂无更新日志内容"
          fi

          {
            echo 'body<<EOF'
            echo "$BODY"
            echo EOF
          } >> "$GITHUB_OUTPUT"

          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"

          # 完整更新日志链接
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | grep -v "$CURRENT_TAG" | head -n 1 || true)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG_URL="https://github.com/${OWNER}/${REPO}/compare/${PREV_TAG}...${CURRENT_TAG}"
          else
            CHANGELOG_URL="https://github.com/${OWNER}/${REPO}/commits/${CURRENT_TAG}"
          fi
          echo "CHANGELOG_URL=$CHANGELOG_URL" >> "$GITHUB_OUTPUT"

      - name: 创建 GitHub Release（中文）
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.TAG }}
          target_commitish: ${{ steps.release_meta.outputs.TARGET }}
          name: ${{ steps.release_meta.outputs.TAG }}
          body: |
            ${{ steps.release_notes.outputs.BODY }}

            ---

            ## Docker 镜像

            Docker 镜像已发布到 GitHub Container Registry：

            ```
            # Backend
            docker pull ghcr.io/silentely/nexus-terminal-backend:${{ steps.release_meta.outputs.VERSION }}
            docker pull ghcr.io/silentely/nexus-terminal-backend:latest

            # Frontend
            docker pull ghcr.io/silentely/nexus-terminal-frontend:${{ steps.release_meta.outputs.VERSION }}
            docker pull ghcr.io/silentely/nexus-terminal-frontend:latest

            # Remote Gateway
            docker pull ghcr.io/silentely/nexus-terminal-remote-gateway:${{ steps.release_meta.outputs.VERSION }}
            docker pull ghcr.io/silentely/nexus-terminal-remote-gateway:latest
            ```

            📖 完整更新日志：${{ steps.release_notes.outputs.CHANGELOG_URL }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 触发 Docker 构建
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: docker-build-triggered
          client-payload: '{"version": "${{ steps.release_meta.outputs.VERSION }}", "tag": "${{ steps.release_meta.outputs.TAG }}"}'
