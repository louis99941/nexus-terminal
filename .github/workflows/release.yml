name: 构建与发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号（留空则使用 VERSION 文件中的版本）'
        required: false
        type: string
  repository_dispatch:
    types: [release-triggered]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 解析版本号
        id: release_meta
        run: |
          set -euo pipefail
          TAG=""
          VERSION=""

          # 优先从 repository_dispatch payload 获取版本号
          PAYLOAD_VERSION=$(jq -r '.client_payload.version // ""' "$GITHUB_EVENT_PATH" 2>/dev/null || echo "")
          PAYLOAD_TAG=$(jq -r '.client_payload.tag // ""' "$GITHUB_EVENT_PATH" 2>/dev/null || echo "")

          if [[ -n "$PAYLOAD_VERSION" ]]; then
            VERSION="$PAYLOAD_VERSION"
            TAG="${PAYLOAD_TAG:-v${VERSION}}"
            echo "✅ 从 repository_dispatch 获取版本号：$VERSION"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            echo "✅ 从标签获取版本号：$VERSION"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION}"
            echo "✅ 从 workflow_dispatch inputs 获取版本号：$VERSION"
          else
            VERSION=$(cat VERSION | tr -d '[:space:]')
            TAG="v${VERSION}"
            echo "✅ 从 VERSION 文件获取版本号：$VERSION"
          fi

          if [[ -z "$TAG" ]]; then
            echo "❌ 无法解析有效的标签，流程终止"
            exit 1
          fi

          echo "✅ 将创建 Release：$TAG (version: $VERSION)"
          {
            echo "TAG=$TAG"
            echo "VERSION=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: 等待 kittylog.app 更新（最多 5 分钟）
        env:
          VERSION: ${{ steps.release_meta.outputs.VERSION }}
        run: |
          echo "⏳ 等待 kittylog.app 生成 v${VERSION} 更新日志..."
          KITTYLOG_URL="https://kittylog.app/c/Silentely/nexus-terminal"
          MAX_ATTEMPTS=5  # 每分钟轮询一次，最多 5 分钟
          POLL_INTERVAL=60

          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "  📡 轮询 [$i/$MAX_ATTEMPTS]..."

            PAGE=$(curl -sL --max-time 5 "$KITTYLOG_URL" 2>/dev/null || true)

            if echo "$PAGE" | grep -qi "v${VERSION}"; then
              echo "✅ kittylog.app 已包含 v${VERSION} 更新日志"
              echo "found=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
              echo "  ⏳ 未找到，${POLL_INTERVAL}s 后重试..."
              sleep $POLL_INTERVAL
            fi
          done

          echo "⚠️ 等待超时（${MAX_ATTEMPTS} 分钟），将使用本地 docs/changelog.md 作为兜底"
          echo "found=false" >> $GITHUB_OUTPUT

      - name: 从 kittylog.app 提取更新日志
        if: steps.wait_kittylog.outputs.found == 'true'
        id: kittylog_extract
        env:
          VERSION: ${{ steps.release_meta.outputs.VERSION }}
        run: |
          set -euo pipefail
          KITTYLOG_URL="https://kittylog.app/c/Silentely/nexus-terminal"

          # 设置默认值，防止步骤失败时输出为空
          echo "found=false" >> $GITHUB_OUTPUT

          PAGE=$(curl -sL --max-time 30 "$KITTYLOG_URL" 2>/dev/null || true)

          if [ -z "$PAGE" ]; then
            echo "⚠️ 无法访问 kittylog.app"
            exit 0
          fi

          # 提取指定版本的更新日志块
          # kittylog.app 使用 Markdown 格式，版本标题为 ## vX.Y.Z
          BODY=$(echo "$PAGE" | awk -v tag="$VERSION" '
            BEGIN { found=0 }
            /^## v/ {
              if (found) { exit }
              if (index($0, tag) > 0) {
                found=1
                print $0
                next
              }
            }
            found && NF { print }
          ')

          if [ -n "$BODY" ]; then
            echo "✅ 从 kittylog.app 提取到 v${VERSION} 更新日志"
            {
              echo 'body<<EOF'
              echo "$BODY"
              echo EOF
            } >> "$GITHUB_OUTPUT"
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ kittylog.app 未找到 v${VERSION} 内容"
          fi

      - name: 从本地 docs/changelog.md 提取更新日志（兜底）
        if: steps.wait_kittylog.outputs.found != 'true' || steps.kittylog_extract.outputs.found != 'true'
        id: local_notes
        env:
          VERSION: ${{ steps.release_meta.outputs.VERSION }}
        run: |
          set -euo pipefail

          BODY=$(awk -v tag="$VERSION" '
            BEGIN { found=0 }
            /^## / {
              if (found) { exit }
              if (index($0, tag) > 0 || index($0, "v" tag) > 0) {
                found=1
                print $0
                next
              }
            }
            found && NF { print }
          ' docs/changelog.md)

          if [ -z "$BODY" ]; then
            BODY="暂无更新日志内容"
          fi

          {
            echo 'body<<EOF'
            echo "$BODY"
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: 合并更新日志内容
        id: release_notes
        env:
          KITTYLOG_FOUND: ${{ steps.kittylog_extract.outputs.found }}
          KITTYLOG_BODY: ${{ steps.kittylog_extract.outputs.body }}
          LOCAL_BODY: ${{ steps.local_notes.outputs.body }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.TAG }}
        run: |
          # 优先使用 kittylog.app 内容，否则使用本地兜底
          if [[ "$KITTYLOG_FOUND" == "true" ]]; then
            BODY="$KITTYLOG_BODY"
            SOURCE="kittylog.app"
          else
            BODY="$LOCAL_BODY"
            SOURCE="本地 docs/changelog.md"
          fi

          echo "📝 使用更新日志来源：$SOURCE"
          {
            echo 'body<<EOF'
            echo "$BODY"
            echo EOF
          } >> $GITHUB_OUTPUT

          # 生成完整更新日志链接
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          CURRENT_TAG="$RELEASE_TAG"
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | grep -v "$CURRENT_TAG" | head -n 1 || true)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG_URL="https://github.com/${OWNER}/${REPO}/compare/${PREV_TAG}...${CURRENT_TAG}"
          else
            CHANGELOG_URL="https://github.com/${OWNER}/${REPO}/commits/${CURRENT_TAG}"
          fi
          echo "CHANGELOG_URL=$CHANGELOG_URL" >> $GITHUB_OUTPUT

      - name: 同步更新日志到 docs/changelog.md
        env:
          VERSION: ${{ steps.release_meta.outputs.VERSION }}
          RELEASE_BODY: ${{ steps.release_notes.outputs.body }}
        run: |
          set -euo pipefail

          echo "📝 将更新日志同步到 docs/changelog.md..."

          # 检查 docs/changelog.md 是否已包含该版本
          if grep -q "## v${VERSION}" docs/changelog.md 2>/dev/null; then
            echo "ℹ️ docs/changelog.md 已包含 v${VERSION}，跳过同步"
            exit 0
          fi

          # 创建临时文件，将新版本日志插入到文件开头（标题之后）
          TEMP_FILE=$(mktemp)
          trap "rm -f $TEMP_FILE" EXIT

          # 读取现有内容，跳过第一行标题
          tail -n +2 docs/changelog.md > "$TEMP_FILE"

          # 写入新版本日志到文件开头
          {
            echo ""
            echo "$RELEASE_BODY"
            echo ""
            cat "$TEMP_FILE"
          } > docs/changelog.md

          echo "✅ 已将 v${VERSION} 更新日志写入 docs/changelog.md"

      - name: 提交更新日志变更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/changelog.md
          if git diff --cached --quiet; then
            echo "ℹ️ 无变更需要提交"
            exit 0
          fi

          # 重试机制：最多尝试 3 次推送
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            echo "📝 尝试提交并推送 [$i/$MAX_RETRIES]..."

            # 先拉取最新代码，解决可能的冲突
            git pull --rebase origin main || true

            if git commit -m "📝 docs: 同步更新日志至 v${{ steps.release_meta.outputs.VERSION }}"; then
              if git push origin main; then
                echo "✅ 已成功提交并推送 docs/changelog.md 变更"
                exit 0
              fi
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "  ⏳ 推送失败，${i}s 后重试..."
              sleep $i
            fi
          done

          echo "❌ 推送失败，请手动检查"
          exit 1

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.TAG }}
          name: ${{ steps.release_meta.outputs.TAG }}
          body: |
            ${{ steps.release_notes.outputs.body }}

            ---

            ## Docker 镜像

            Docker 镜像已发布到 GitHub Container Registry：

            ```
            # Backend
            docker pull ghcr.io/silentely/nexus-terminal-backend:${{ steps.release_meta.outputs.VERSION }}
            docker pull ghcr.io/silentely/nexus-terminal-backend:latest

            # Frontend
            docker pull ghcr.io/silentely/nexus-terminal-frontend:${{ steps.release_meta.outputs.VERSION }}
            docker pull ghcr.io/silentely/nexus-terminal-frontend:latest

            # Remote Gateway
            docker pull ghcr.io/silentely/nexus-terminal-remote-gateway:${{ steps.release_meta.outputs.VERSION }}
            docker pull ghcr.io/silentely/nexus-terminal-remote-gateway:latest
            ```

            📖 完整更新日志：${{ steps.release_notes.outputs.CHANGELOG_URL }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 触发 Docker 构建
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: docker-build-triggered
          client-payload: '{"version": "${{ steps.release_meta.outputs.VERSION }}", "tag": "${{ steps.release_meta.outputs.TAG }}"}'
