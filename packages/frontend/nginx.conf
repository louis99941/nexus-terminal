# 当上游代理（如宿主机 nginx）未传递 X-Forwarded-Proto 时，回退到当前 scheme
# 这确保 express-session 的 proxy + secure cookie 能正确检测 HTTPS
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 8080;
    server_name localhost;
    client_max_body_size 10m; # 允许最大 10MB 的请求体

    # Root directory for static files
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Serve static files directly
    location / {
        access_log off;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (JS, CSS, images, fonts)
    # Match hashed filenames (common in Vite/Webpack builds) for long-term caching
    location ~* \.(?:css|js|woff|woff2|ttf|eot|ico|svg|png|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        
        # Enable serving pre-compressed .gz files if they exist
        gzip_static on; 
    }

    # Proxy API requests to the backend service
    location ^~ /api/ { # Use ^~ for preferential prefix matching
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream http://backend:3001;
        access_log off;
        # rewrite ^/api(/.*)$ $1 break; # Remove /api prefix before proxying - REMOVED to match backend routes
        proxy_pass $backend_upstream; # Proxy to backend root, backend expects /api/v1/...

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 保留上游代理（如 Cloudflare/nginx）设置 the 协议头，若不存在则使用当前 scheme
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        # WebSocket support (if needed by the backend API)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Proxy WebSocket requests to the backend service
    location /ws/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream http://backend:3001;
        access_log off;
        proxy_pass $backend_upstream; # Assuming backend handles WS on the same port

        # Required headers for WebSocket proxying
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade; # Prevent caching issues
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 保留上游代理设置的协议头，回退到当前 scheme
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
}
